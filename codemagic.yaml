workflows:
  react-web-build:
    name: React Web Build
    instance_type: mac_mini_m1
    max_build_duration: 60
    environment:
      node: latest
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Lint
        script: npm run lint
      - name: Build
        script: npm run build
    artifacts:
      - dist/**/*
